<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Proctor - Start Exam</title>
  <style>
    :root {
      --primary-color: #ecad1a;
      --secondary-color: #4cca61;
      --accent-color: #00d2ff;
      --background-color: #263f65;
      --text-color: #2c5043;
      --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--background-color) 0%, #e0e6ed 100%);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
    }

    .container {
      background-color: white;
      border-radius: 12px;
      box-shadow: var(--box-shadow);
      padding: 40px;
      width: 400px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
    }

    h1 {
      color: var(--primary-color);
      margin-bottom: 30px;
      font-weight: 600;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    input:focus {
      border-color: var(--secondary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(93, 156, 236, 0.2);
    }

    .btn {
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s;
      width: 100%;
      box-shadow: 0 4px 6px rgba(58, 123, 213, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 10px rgba(58, 123, 213, 0.3);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .admin-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--secondary-color);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
    }

    .admin-link:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }

    .tech-decoration {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,210,255,0.05) 0%, rgba(58,123,213,0.02) 70%, transparent 100%);
      z-index: -1;
    }

    .tech-decoration.top-right {
      top: -75px;
      right: -75px;
    }

    .tech-decoration.bottom-left {
      bottom: -75px;
      left: -75px;
    }
  </style>
</head>
<body>
<div class="container">
<h1>AI Proctor Exam Portal</h1>
<button class="btn" onclick="window.location.href='/demo_exam'">Start Exam</button>
<a href="/admin" style="display:block;margin-top:15px;">Admin Dashboard</a>
</div>

<script>
function startExam(){
    const username = document.getElementById("username").value.trim();
    if(!username){ alert("Enter username"); return; }
    fetch("/start_exam",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username})})
    .then(res=>res.json()).then(data=>{
        if(data.message.includes("blocked")){
            alert(data.message);
        } else {
            window.location.href="/demo_exam";
        }
    });
}
</script>
</body>
</html>
